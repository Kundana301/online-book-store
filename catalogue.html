<!DOCTYPE html>
<html>
<head>
    <title>Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Book Catalog</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
        <a href="login.html" id="loginLink">Login</a>
        <span id="userWelcome"></span>
    </nav>
</header>

<div id="bookList"></div>

<script src="script.js"></script>
<script>
    let user = getUser();
    if(user) {
        document.getElementById('userWelcome').innerHTML = `Hello, ${user}`;
        document.getElementById('loginLink').style.display = 'none';
    }

    const books = [
        {id:1, name:"Book A", price:200},
        {id:2, name:"Book B", price:150},
        {id:3, name:"Book C", price:300}
    ];

    let bookListDiv = document.getElementById('bookList');
    books.forEach(book=>{
        bookListDiv.innerHTML += `
            <div class="card">
                <h3>${book.name}</h3>
                <p>Price: ₹${book.price}</p>
                <button onclick='addToCart(${JSON.stringify(book)})'>Add to Cart</button>
            </div>
        `;
    });
</script>

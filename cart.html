<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadCart()">

<header>
    <h2>My Cart</h2>
</header>

<table width="100%" cellspacing="10">
    <thead>
        <tr>
            <th align="left">Book</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="cart">
        <!-- Cart items injected by JS -->
    </tbody>
</table>

<h3 id="totalAmount"></h3>

<!-- CART ACTIONS -->
<button onclick="confirmClearCart()">Clear Cart</button>
<button id="checkoutBtn" onclick="checkoutCart()">Checkout</button>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadCart()">

<h2>My Cart</h2>

<table width="100%" border="1" cellpadding="10">
    <thead>
        <tr>
            <th>Book</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="cart"></tbody>
</table>

<h3 id="totalAmount"></h3>

<button onclick="confirmClearCart()">Clear Cart</button>
<button id="checkoutBtn" onclick="checkoutCart()">Checkout</button>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Shopping Cart</h1>
</header>

<div class="container">
    <div class="card">
        <table>
            <tr>
                <th>Book</th>
                <th>Price</th>
                <th>Remove</th>
            </tr>
            <tr>
                <td>Web Technologies</td>
                <td>₹450</td>
                <td><button>Remove</button></td>
            </tr>
            <tr>
                <td>Data Structures</td>
                <td>₹550</td>
                <td><button>Remove</button></td>
            </tr>
        </table>

        <h3>Total: ₹1000</h3>
        <button>Proceed to Checkout</button>
    </div>
</div>

<footer>
    <p>Thank you for shopping!</p>
</footer>

</body>
</html>

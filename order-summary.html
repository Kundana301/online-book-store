<!DOCTYPE html>
<html>
<head>
    <title>Order Summary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Order Summary</h1>
    <a href="index.html">Home</a>
</header>

<div id="orderDetails"></div>

<button onclick="makePayment()">Pay Now</button>

<script src="script.js"></script>
<script>
    let user = getUser();
    let cart = JSON.parse(localStorage.getItem("currentOrder_" + user)) || [];
    let orderDiv = document.getElementById("orderDetails");
    if(cart.length === 0) {
        orderDiv.innerHTML = "<p>No items in your order.</p>";
    } else {
        cart.forEach(item=>{
            orderDiv.innerHTML += `<p>${item.name} x ${item.qty || 1} - ₹${item.price * (item.qty || 1)}</p>`;
        });
    }
</script>
</body>
</html>

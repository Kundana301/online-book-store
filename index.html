<!DOCTYPE html>
<html>
<head>
    <title>Online Book Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Online Book Store</h1>
    <input id="search" placeholder="Search books..." onkeyup="searchBooks()">
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="cart.html">Cart</a>
    <a href="order-history.html">Orders</a>
    <a href="login.html">Login</a>
</nav>

<div class="grid">
    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71aFt4+OTOL.jpg">
        <h3>Python Programming</h3>
        <p>₹500</p>
        <button onclick="addToCart('Python Programming',500)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/81bsw6fnUiL.jpg">
        <h3>Java Complete Guide</h3>
        <p>₹650</p>
        <button onclick="addToCart('Java Complete Guide',650)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/71k+8zKj2ML.jpg">
        <h3>Data Structures</h3>
        <p>₹550</p>
        <button onclick="addToCart('Data Structures',550)">Add to Cart</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
